<style>
:root{--sb:#0f1923;--sb2:#162030;--sb3:#1e2d40;--acc:#00843D;--acc2:#00b356;--acc3:#34d399;--bg:#f0f4f8;--card:#fff;--brd:#e2e8f0;--t1:#0f172a;--t2:#334155;--t3:#64748b;--t4:#94a3b8;--grn:#10b981;--grn2:#dcfce7;--grn3:#166534;--yel:#f59e0b;--yel2:#fef9c3;--yel3:#92400e;--red:#ef4444;--red2:#fee2e2;--red3:#7f1d1d;--blu:#3b82f6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);display:flex;height:100vh;overflow:hidden;}
/* ---- SIDEBAR ---- */
#sb{width:255px;min-width:255px;background:var(--sb);color:#e2e8f0;display:flex;flex-direction:column;overflow-y:auto;z-index:10;transition:width .2s;}
#sb::-webkit-scrollbar{width:4px;}#sb::-webkit-scrollbar-thumb{background:#2d4a6a;border-radius:2px;}
#sb-head{padding:18px 16px 14px;border-bottom:1px solid #1e2d40;}
#sb-head .logo{font-size:13px;font-weight:800;color:#fff;letter-spacing:.8px;display:flex;align-items:center;gap:8px;}
#sb-head .logo span{background:var(--acc);color:#fff;padding:3px 7px;border-radius:4px;font-size:11px;}
#sb-head p{font-size:10.5px;color:#64748b;margin-top:5px;}
.sb-nav{padding:10px 8px;}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:7px;cursor:pointer;font-size:12.5px;color:#94a3b8;transition:all .15s;margin-bottom:3px;}
.sb-btn:hover{background:var(--sb3);color:#e2e8f0;}
.sb-btn.act{background:var(--acc);color:#fff;}
.sb-btn .ic{font-size:15px;width:18px;text-align:center;}
.rg-lbl{font-size:9.5px;font-weight:700;letter-spacing:1px;color:#475569;text-transform:uppercase;padding:10px 12px 5px;}
.ci{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:#64748b;transition:all .15s;margin-bottom:2px;}
.ci:hover{background:var(--sb3);color:#cbd5e1;}
.ci.act{background:rgba(0,132,61,.15);color:#6ee7a0;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dg{background:var(--grn);}
.dy{background:var(--yel);}
.dr{background:var(--red);}
.dn{background:#334155;}
/* ---- MAIN ---- */
#main{flex:1;overflow-y:auto;padding:24px;background:var(--bg);}
#main::-webkit-scrollbar{width:6px;}#main::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
.pg-title{font-size:21px;font-weight:800;color:var(--t1);margin-bottom:3px;}
.pg-sub{font-size:12.5px;color:var(--t3);margin-bottom:22px;}
/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px;margin-bottom:20px;}
.kc{background:var(--card);border-radius:11px;padding:15px;border:1px solid var(--brd);box-shadow:0 1px 3px rgba(0,0,0,.04);}
.kc .klbl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.kc .kval{font-size:20px;font-weight:800;color:var(--t1);margin:6px 0 3px;line-height:1;}
.kc .kch{font-size:11.5px;font-weight:700;}
.pos{color:var(--grn);}
.neg{color:var(--red);}
.neu{color:var(--t3);}
/* Charts */
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px;}
.cg1{display:grid;grid-template-columns:1fr;gap:18px;margin-bottom:20px;}
.cc{background:var(--card);border-radius:11px;padding:18px;border:1px solid var(--brd);box-shadow:0 1px 3px rgba(0,0,0,.04);}
.cc.full{grid-column:1/-1;}
.ct{font-size:12.5px;font-weight:700;color:var(--t1);margin-bottom:14px;}
.cw{position:relative;height:200px;}
.cw2{position:relative;height:240px;}
.cw3{position:relative;height:260px;}
/* Tables */
.tc{background:var(--card);border-radius:11px;padding:18px;border:1px solid var(--brd);box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:20px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#f8fafc;color:var(--t3);font-weight:700;padding:9px 11px;text-align:right;border-bottom:2px solid var(--brd);font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
th:first-child{text-align:left;}
td{padding:8px 11px;text-align:right;border-bottom:1px solid #f1f5f9;color:var(--t2);}
td:first-child{text-align:left;font-weight:600;color:var(--t1);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f8fafc;}
.nv{color:var(--red)!important;}
/* Badges */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;}
.bg{background:var(--grn2);color:var(--grn3);}
.by{background:var(--yel2);color:var(--yel3);}
.br{background:var(--red2);color:var(--red3);}
.bna{background:#f1f5f9;color:var(--t3);}
/* Alerts */
.alr{padding:11px 14px;border-radius:7px;margin-bottom:7px;font-size:12px;border-left:3px solid;}
.alr-r{background:var(--red2);border-color:var(--red);color:var(--red3);}
.alr-y{background:var(--yel2);border-color:var(--yel);color:var(--yel3);}
.alr-g{background:var(--grn2);border-color:var(--grn);color:var(--grn3);}
/* Source box */
.src{background:#f8fafc;border:1px solid var(--brd);border-radius:8px;padding:12px 14px;font-size:10.5px;color:var(--t3);margin-bottom:20px;}
.src b{color:var(--t2);}
.src table td{font-size:10.5px;padding:3px 8px;border-bottom:1px solid #e2e8f0;}
.src table td:first-child{text-align:left;}
/* Section divider */
.sdiv{display:flex;align-items:center;gap:10px;margin:20px 0 16px;}
.sdiv span{font-size:13px;font-weight:700;color:var(--t1);white-space:nowrap;}
.sdiv hr{flex:1;border:none;border-top:1px solid var(--brd);}
/* Rank table */
.rank{display:inline-flex;width:22px;height:22px;border-radius:50%;background:var(--acc);color:#fff;font-size:10px;font-weight:700;align-items:center;justify-content:center;}
/* Summary bar */
.sbar{background:var(--card);border-radius:11px;padding:14px 18px;border:1px solid var(--brd);margin-bottom:20px;display:flex;gap:24px;flex-wrap:wrap;}
.sbar-item{display:flex;flex-direction:column;gap:2px;}
.sbar-item .sl{font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.sbar-item .sv{font-size:15px;font-weight:800;color:var(--t1);}
/* Responsive */
@media(max-width:860px){.cg2{grid-template-columns:1fr;}}
/* ---- TABS ---- */
.tab-nav{display:flex;gap:4px;margin-bottom:22px;background:var(--card);border-radius:10px;padding:5px;border:1px solid var(--brd);width:fit-content;}
.tab-btn{padding:8px 20px;border-radius:7px;border:none;cursor:pointer;font-size:12.5px;font-weight:700;color:var(--t3);background:transparent;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:var(--t1);}
.tab-btn.act{background:var(--acc);color:#fff;}
/* ---- QUARTERLY ---- */
.qtbl{font-size:11px;}
.qtbl th{font-size:9.5px;padding:7px 8px;}
.qtbl td{font-size:11px;padding:6px 8px;}
.qtbl .q25{background:#f0fdf4;}
.qtbl .q24{background:#eff6ff;}
.qtbl .qvar{background:#fafafa;font-weight:700;}
.qtbl .hdr25{background:#dcfce7;color:#166534;font-weight:800;}
.qtbl .hdr24{background:#dbeafe;color:#1e3a5f;font-weight:800;}
.qtbl .hdrv{background:#f1f5f9;color:var(--t3);font-weight:800;}
.qtbl .hlrow td{background:#f8fafc;font-weight:800;}
.qtbl .subtxt{color:var(--t3);font-style:italic;font-weight:400;}
.qkpi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.qkpi .kc .klbl{font-size:9.5px;}
.qkpi .kc .kval{font-size:15px;}
.qbadge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:800;margin-right:3px;}
.qbg{background:var(--grn2);color:var(--grn3);}
.qbr{background:var(--red2);color:var(--red3);}
/* ---- INVESTOR REPORT ---- */
.inv-report{background:linear-gradient(135deg,#ffffff 0%,#f8fdf9 100%);border-radius:14px;padding:28px 32px;border:1px solid #d1e7d9;box-shadow:0 2px 12px rgba(0,132,61,.06);margin-bottom:24px;position:relative;overflow:hidden;}
.inv-report::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#00843D,#00b356,#34d399);}
.inv-report-hdr{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #e2e8f0;}
.inv-logo{width:42px;height:42px;background:var(--acc);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;letter-spacing:-1px;flex-shrink:0;}
.inv-hdr-txt h3{font-size:15px;font-weight:800;color:var(--t1);margin:0;line-height:1.2;}
.inv-hdr-txt p{font-size:11px;color:var(--t3);margin:2px 0 0;font-weight:500;}
.inv-section{margin-bottom:16px;}
.inv-section:last-child{margin-bottom:0;}
.inv-section-title{font-size:11.5px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.inv-section-title::before{content:'';width:3px;height:14px;background:var(--acc);border-radius:2px;flex-shrink:0;}
.inv-text{font-size:12.5px;color:var(--t2);line-height:1.75;text-align:justify;}
.inv-text strong{color:var(--t1);font-weight:700;}
.inv-text .inv-up{color:var(--grn);font-weight:700;}
.inv-text .inv-dn{color:var(--red);font-weight:700;}
.inv-text .inv-num{font-weight:700;color:var(--t1);}
.inv-highlight{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:14px 0;padding:14px;background:rgba(0,132,61,.04);border-radius:10px;border:1px solid rgba(0,132,61,.1);}
.inv-hl-item{text-align:center;}
.inv-hl-item .hl-val{font-size:18px;font-weight:800;color:var(--t1);line-height:1;}
.inv-hl-item .hl-sub{font-size:10px;color:var(--t3);margin-top:3px;}
.inv-hl-item .hl-chg{font-size:11px;font-weight:700;margin-top:2px;}
.inv-disclaimer{font-size:9.5px;color:var(--t4);margin-top:14px;padding-top:10px;border-top:1px solid #f1f5f9;font-style:italic;line-height:1.5;}
/* ---- VENTAS MODULE ---- */
.vt-tabs{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap;}
.vt-tab{padding:8px 18px;border-radius:7px;border:1px solid var(--brd);cursor:pointer;font-size:12px;font-weight:700;color:var(--t3);background:var(--card);transition:all .15s;}
.vt-tab:hover{color:var(--t1);border-color:var(--acc);}
.vt-tab.act{background:var(--acc);color:#fff;border-color:var(--acc);}
.vt-filter{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;}
.vt-filter select{padding:6px 10px;border:1px solid var(--brd);border-radius:6px;font-size:12px;background:#fff;cursor:pointer;}
.vt-bar{height:20px;border-radius:4px;transition:width .4s ease;}
.vt-hbar{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.vt-hbar-label{width:100px;font-size:11px;font-weight:600;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.vt-insight-title{font-size:11px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}

.vt-insight strong{color:var(--t1);}

#chat-close{margin-left:auto;background:none;border:none;color:#64748b;cursor:pointer;font-size:18px;padding:4px;}

.ch-msg{max-width:88%;padding:10px 14px;border-radius:14px;font-size:12.5px;line-height:1.6;word-wrap:break-word;}

function fmt(v,d=1){if(v===null||v===undefined||isNaN(v))return'-';return v.toLocaleString('es-MX',{minimumFractionDigits:d,maximumFractionDigits:d});}

// Map HTML country keys to QTD keys
function qk(co){return co==='Rep. Dom.'?'Rep. Dominicana':co;}
// Get quarterly incremental values for a metric
function qIncrMetric(yr,co,metric){
  if(!QTD)return[0,0,0,0];
  const qs=['Q1','Q2','Q3','Q4'],ytd=QTD.quarterly_ytd[yr],key=qk(co);
  if(!ytd||!ytd[key])return[0,0,0,0];
  return qs.map((q,i)=>{
    const curr=ytd[key][q]?ytd[key][q][metric]||0:0;
    const prev=i>0&&ytd[key][qs[i-1]]?ytd[key][qs[i-1]][metric]||0:0;
    return i===0?curr:curr-prev;
  });
}
// Get R-code quarterly incremental
function qRCode(yr,co,code){
  if(!QTD||!QTD.r_detail_quarterly||!QTD.r_detail_quarterly[yr])return[0,0,0,0];
  const qs=['Q1','Q2','Q3','Q4'],rd=QTD.r_detail_quarterly[yr],key=qk(co);
  if(!rd[key])return[0,0,0,0];
  return qs.map((q,i)=>{
    const curr=rd[key][q]?rd[key][q][code]||0:0;
    const prev=i>0&&rd[key][qs[i-1]]?rd[key][qs[i-1]][code]||0:0;
    return i===0?curr:curr-prev;
  });
}
// Monthly all metrics for a country/year
function qMonthlyMetric(yr,co,metric){
  if(!QTD||!QTD.monthly_all||!QTD.monthly_all[yr])return Array(12).fill(0);
  const key=qk(co),mData=QTD.monthly_all[yr][key];
  if(!mData||!mData[metric])return Array(12).fill(0);
  return mData[metric];
}

// Trend analysis
function trend(d23,d24,d25){
  const metrics=['ventas','ebitda','margebda','utilneta'];
  const results={};
  const vals={
    ventas:{y23:d23.v,y24:d24.v,y25:d25.v},
    ebitda:{y23:d23.eb,y24:d24.eb,y25:d25.eb},
    margebda:{y23:pct(d23.eb/d23.v),y24:pct(d24.eb/d24.v),y25:pct(d25.eb/d25.v)},
    utilneta:{y23:d23.un,y24:d24.un,y25:d25.un}
  };
  const labels={ventas:'Ventas Netas',ebitda:'EBITDA',margebda:'Margen EBITDA (%)',utilneta:'Utilidad Neta'};
  metrics.forEach(m=>{
    const {y23,y24,y25}=vals[m];
    let rate=null,exp=null,canCalc=false;
    if(y23!==null&&Math.abs(y23)>0.001){
      rate=(y24-y23)/Math.abs(y23);
      exp=y24*(1+rate);
      canCalc=true;
    } else if(y23!==null&&Math.abs(y23)<=0.001){
      exp=y24; canCalc=false;
    }
    const dev=canCalc&&exp!==null&&Math.abs(exp)>0.001?chg(exp,y25):null;
    let status='gray';
    if(dev!==null){
      if(Math.abs(dev)<=0.10)status='green';
      else if(Math.abs(dev)<=0.25)status='yellow';
      else status='red';
    }
    results[m]={label:labels[m],y23,y24,y25,rate,exp,dev,status,canCalc};
  });
  return results;
}

function statusEmoji(s){return s==='green'?'✅':s==='yellow'?'🟡':s==='red'?'🔴':'⚪';}
function statusBadge(s){
  const e=statusEmoji(s);
  const c=s==='green'?'bg':s==='yellow'?'by':s==='red'?'br':'bna';
  return `<span class="bdg ${c}">${e} ${s==='green'?'Normal':s==='yellow'?'Atención':s==='red'?'Foco Rojo':'N/D'}</span>`;
}

// Overall status for country (worst metric)
function overallStatus(d23,d24,d25){
  if(!d23||!d24||!d25)return'gray';
  const tr=trend(d23,d24,d25);
  const order=['red','yellow','green','gray'];
  let worst='gray';
  Object.values(tr).forEach(r=>{
    if(order.indexOf(r.status)<order.indexOf(worst))worst=r.status;
  });
  return worst;
}

// ═══════════════════ VENTAS POR MARCA MODULE (2025 data) ═══════════════════
function renderVentas(){
  // Support both old VENTAS and new VENTAS_MARCA/VENTAS_CLIENTE/VENTAS_SEGMENTO
  const hasNew=(typeof VENTAS_MARCA!=='undefined'&&typeof VENTAS_CLIENTE!=='undefined'&&typeof VENTAS_SEGMENTO!=='undefined');
  const VM=hasNew?VENTAS_MARCA:{};
  const VC=hasNew?VENTAS_CLIENTE:{};
  const VS=hasNew?VENTAS_SEGMENTO:{};
  const M=1000000; // raw to MM MXN
  const fmtV=v=>v!==null&&v!==undefined&&!isNaN(v)?(v/1).toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1}):'—';
  const fmtP=v=>v!==null&&v!==undefined&&!isNaN(v)&&isFinite(v)?((v>=0?'+':'')+v.toFixed(1)+'%'):'—';
  const varP=(a,b)=>a&&Math.abs(a)>0.001?((b-a)/Math.abs(a)*100):null;
  const cVar=v=>v===null?'color:#94a3b8':v>=0?'color:#10b981':'color:#ef4444';

  // Get all countries present in VENTAS_MARCA
  const countries=Object.keys(VM).filter(c=>ACTIVE.includes(c)).sort();

  // Build aggregated global brand list from VENTAS_MARCA
  // Each entry: {b: brand, s: segment, q1v,q1c,q2v,q2c,q3v,q3c,q4v,q4c, tv,tc}
  // Values are raw MXN — divide by M to get MM MXN
  function globalBrands(){
    const map={};
    countries.forEach(co=>{
      const arr=VM[co]||[];
      arr.forEach(br=>{
        const key=(br.b||'').toUpperCase().trim();
        if(!key)return;
        if(!map[key])map[key]={brand:br.b,segment:br.s||'',countries:[],
          q1v:0,q1c:0,q2v:0,q2c:0,q3v:0,q3c:0,q4v:0,q4c:0,tv:0,tc:0};
        map[key].q1v+=(br.q1v||0)/M; map[key].q1c+=(br.q1c||0)/M;
        map[key].q2v+=(br.q2v||0)/M; map[key].q2c+=(br.q2c||0)/M;
        map[key].q3v+=(br.q3v||0)/M; map[key].q3c+=(br.q3c||0)/M;
        map[key].q4v+=(br.q4v||0)/M; map[key].q4c+=(br.q4c||0)/M;
        map[key].tv+=(br.tv||0)/M;   map[key].tc+=(br.tc||0)/M;
        if(!map[key].countries.includes(co))map[key].countries.push(co);
      });
    });
    return Object.values(map).sort((a,b)=>b.tv-a.tv);
  }

  // Get segment totals across all countries
  function globalSegTotals(){
    let otcV=0,otcC=0,pcV=0,pcC=0,totV=0,totC=0;
    countries.forEach(co=>{
      const sg=VS[co]||{};
      otcV+=(sg.otcV||0)/M; otcC+=(sg.otcC||0)/M;
      pcV+=(sg.pcV||0)/M;   pcC+=(sg.pcC||0)/M;
      totV+=(sg.totV||0)/M; totC+=(sg.totC||0)/M;
    });
    // fallback: sum from brands
    if(totV===0){const gb=globalBrands();totV=gb.reduce((a,b)=>a+b.tv,0);otcV=gb.filter(b=>b.segment==='OTC').reduce((a,b)=>a+b.tv,0);pcV=gb.filter(b=>b.segment==='PC').reduce((a,b)=>a+b.tv,0);}
    return{otcV,otcC,pcV,pcC,totV,totC};
  }

  // Country client list from VENTAS_CLIENTE
  // {n: name, q1, q2, q3, q4, t: total} — raw MXN
  function countryClients(co){
    const arr=VC[co]||[];
    return arr.map(cl=>({
      n:cl.n,
      q1:(cl.q1||0)/M, q2:(cl.q2||0)/M,
      q3:(cl.q3||0)/M, q4:(cl.q4||0)/M,
      t:(cl.t||0)/M
    })).sort((a,b)=>b.t-a.t);
  }

  // Country brands from VENTAS_MARCA
  function countryBrands(co){
    const arr=VM[co]||[];
    return arr.map(br=>({
      b:br.b, s:br.s||'',
      q1v:(br.q1v||0)/M, q1c:(br.q1c||0)/M,
      q2v:(br.q2v||0)/M, q2c:(br.q2c||0)/M,
      q3v:(br.q3v||0)/M, q3c:(br.q3c||0)/M,
      q4v:(br.q4v||0)/M, q4c:(br.q4c||0)/M,
      tv:(br.tv||0)/M, tc:(br.tc||0)/M
    })).sort((a,b)=>b.tv-a.tv);
  }

  function buildOverview(){
    const gb=globalBrands();
    const seg=globalSegTotals();
    const totalVta=seg.totV||gb.reduce((a,b)=>a+b.tv,0);
    const otcVta=seg.otcV;
    const pcVta=seg.pcV;
    const otroVta=Math.max(0,totalVta-otcVta-pcVta);
    const top10=gb.slice(0,10);
    const maxVta=top10.length>0?top10[0].tv:1;
    const activeBrands=gb.filter(b=>b.tv>0.5).length;

    // KPI Row
    let html='<div class="kpi-row">';
    html+=`<div class="kc" style="border-left:4px solid var(--acc);"><div class="klbl">VENTAS TOTALES POR MARCA</div><div class="kval" style="color:var(--acc);">${fmtV(totalVta)} MM</div><div class="kch neu">Consolidado 16 Paises</div></div>`;
    const otcPct=totalVta>0?(otcVta/totalVta*100):0;
    const pcPct=totalVta>0?(pcVta/totalVta*100):0;
    html+=`<div class="kc" style="border-left:4px solid #00843D;"><div class="klbl">SEGMENTO OTC</div><div class="kval">${fmtV(otcVta)} MM</div><div class="kch neu">${otcPct.toFixed(1)}% del total</div></div>`;
    html+=`<div class="kc" style="border-left:4px solid #3b82f6;"><div class="klbl">SEGMENTO PC</div><div class="kval">${fmtV(pcVta)} MM</div><div class="kch neu">${pcPct.toFixed(1)}% del total</div></div>`;
    html+=`<div class="kc" style="border-left:4px solid #f59e0b;"><div class="klbl">MARCAS ACTIVAS</div><div class="kval">${activeBrands}</div><div class="kch neu">en ${countries.length} paises</div></div>`;
    const mgBrutoGlobal=totalVta>0?((totalVta-seg.totC)/totalVta*100):0;
    html+=`<div class="kc" style="border-left:4px solid #8b5cf6;"><div class="klbl">MARGEN BRUTO GLOBAL</div><div class="kval">${mgBrutoGlobal.toFixed(1)}%</div><div class="kch neu">Vta - Costo / Vta</div></div>`;

  function buildStrategic(){

    // Brand concentration
    const top5Pct=totalVta>0?(gb.slice(0,5).reduce((a,b)=>a+b.tv,0)/totalVta*100):0;
    const top10Pct=totalVta>0?(gb.slice(0,10).reduce((a,b)=>a+b.tv,0)/totalVta*100):0;

    html+=`<div class="kpi-row">
      <div class="kc" style="border-left:4px solid #8b5cf6;"><div class="klbl">CONCENTRACION TOP 5 MARCAS</div><div class="kval">${top5Pct.toFixed(1)}%</div></div>
      <div class="kc" style="border-left:4px solid #3b82f6;"><div class="klbl">CONCENTRACION TOP 10</div><div class="kval">${top10Pct.toFixed(1)}%</div></div>

      <div class="kc" style="border-left:4px solid #f59e0b;"><div class="klbl">TOTAL MARCAS</div><div class="kval">${gb.filter(b=>b.tv>0.5).length}</div></div>
    </div>`;

    // Strategic report
    html+='<div class="inv-report"><div class="inv-report-hdr"><div class="inv-logo">GL</div><div class="inv-hdr-txt"><h3>Analisis Estrategico de Ventas por Marca</h3><p>Insights y Recomendaciones — Portafolio 2025</p></div></div>';

    // Stars (high total + good margin)
    const stars=gb.filter(br=>br.tv>20&&(br.tv-br.tc)/br.tv>0.5).sort((a,b)=>b.tv-a.tv);
    // At risk (negative margin or declining Q4 vs Q1)
    const atRisk=gb.filter(br=>br.tv>2&&((br.tc>br.tv)||(br.q1v>0&&br.q4v<br.q1v*0.8)));
    // Best margin
    const bestMg=gb.filter(br=>br.tv>5).sort((a,b)=>((b.tv-b.tc)/b.tv)-((a.tv-a.tc)/a.tv)).slice(0,5);

    html+='<div class="inv-section"><div class="inv-section-title">Marcas Estrella (Alto Volumen + Margen >50%)</div><div class="inv-text">';
    if(stars.length>0){
      stars.slice(0,6).forEach(br=>{
        const mg=((br.tv-br.tc)/br.tv*100);
        html+=`<p><strong>${br.brand}</strong> (${br.segment||'—'}): Ventas <span class="inv-num">${fmtV(br.tv)} MM</span>, Margen Bruto <span class="inv-up">${mg.toFixed(1)}%</span>. Presente en <span class="inv-num">${br.countries.length}</span> paises.</p>`;
      });
    } else {html+='<p>Analizar marcas principales del portafolio para oportunidades de optimizacion.</p>';}
    html+='</div></div>';

    html+='<div class="inv-section"><div class="inv-section-title">Top 5 Marcas por Margen Bruto</div><div class="inv-text">';
    bestMg.forEach((br,i)=>{
      const mg=((br.tv-br.tc)/br.tv*100);
      html+=`<p><b>${i+1}. ${br.brand}</b>: Margen <span class="inv-up">${mg.toFixed(1)}%</span> — ${fmtV(br.tv)} MM en ventas.</p>`;
    });
    html+='</div></div>';

    html+='<div class="inv-section"><div class="inv-section-title">Marcas que Requieren Atencion</div><div class="inv-text">';
    if(atRisk.length>0){
      atRisk.slice(0,5).forEach(br=>{
        const mg=br.tv>0?((br.tv-br.tc)/br.tv*100):0;
        html+=`<p><strong>${br.brand}</strong> (${br.segment||'—'}): <span class="inv-dn">Margen ${mg.toFixed(1)}%</span>. Revisar estructura de costos y estrategia de pricing. Ventas: ${fmtV(br.tv)} MM.</p>`;
      });
    } else {html+='<p>El portafolio en general muestra margenes saludables.</p>';}
    html+='</div></div>';

    html+=`<div class="inv-section"><div class="inv-section-title">Recomendaciones Estrategicas</div><div class="inv-text">
      <p><strong>1. Concentracion de portafolio:</strong> Las Top 5 marcas concentran el <span class="inv-num">${top5Pct.toFixed(0)}%</span> de las ventas. Oportunidad de fortalecer marcas de rango medio.</p>
      <p><strong>2. Expansion geografica:</strong> Identificar marcas exitosas en pocos paises y expandirlas. Mayor presencia geografica = mayor resiliencia.</p>

    </div></div>`;

    html+='<div class="inv-disclaimer">Analisis generado a partir de datos de ventas por marca (fuente: ventas_2025_data.js). Cifras en MM MXN (raw / 1,000,000). Segmentacion: OTC / Personal Care. Periodo: 2025.</div></div>';
    return html;

// ═══════════════════ RENDER BENCHMARK ═══════════════════
function renderBenchmark(){
  const fv=v=>v!==null&&v!==undefined?(v>=1000?(v/1000).toFixed(1)+'K':v.toLocaleString('en',{maximumFractionDigits:1})):'—';
  const fp=v=>v!==null&&v!==undefined?v.toFixed(1)+'%':'—';
  const cz=v=>v===null||v===undefined?'color:#94a3b8':v>=0?'color:#10b981':'color:#ef4444';

  function buildMarginChart(cat,metric){
    const companies=BENCH_DATA[cat].filter(c=>{const qs=Object.values(c.quarters);return qs.length>0&&qs[0][metric]!==null&&qs[0][metric]!==undefined;});
    const sorted=[...companies].sort((a,b)=>(Object.values(b.quarters)[0][metric]||0)-(Object.values(a.quarters)[0][metric]||0));
    return sorted.map((c,i)=>{
      const val=Object.values(c.quarters)[0][metric]||0;
      const maxW=Math.min(Math.max(Math.abs(val),1),55);
      const isHL=c.highlight;
      const medal=i===0?'&#x1F947;':i===1?'&#x1F948;':i===2?'&#x1F949;':'<span style="width:18px;display:inline-block;text-align:center;font-size:10px;color:#94a3b8">'+(i+1)+'</span>';
      const bg=isHL?'background:linear-gradient(90deg,#00843D,#34d399)':'background:linear-gradient(90deg,'+c.color+','+c.color+'66)';
      const border=isHL?'border:2px solid #00843D;box-shadow:0 2px 8px rgba(0,132,61,.25)':'';
      return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;padding:5px 10px;border-radius:8px;'+(isHL?'background:#f0fdf4;'+border:'')+'">'+
        '<span style="font-size:13px">'+medal+'</span>'+
        '<div style="width:120px;font-size:11px;font-weight:'+(isHL?'800':'600')+';color:'+(isHL?'#00843D':'#334155')+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="'+c.name+' ('+c.ticker+')">'+c.name+'</div>'+
        '<div style="flex:1;height:24px;background:#f1f5f9;border-radius:5px;overflow:hidden;"><div style="height:100%;width:'+Math.max(maxW*1.8,3)+'%;'+bg+';border-radius:5px;transition:width .6s ease;"></div></div>'+
        '<div style="width:58px;text-align:right;font-size:12.5px;font-weight:700;color:'+(val>=0?'#10b981':'#ef4444')+'">'+val.toFixed(1)+'%</div></div>';
    }).join('');
  }

  function buildTable(cat){
    const companies=BENCH_DATA[cat];
    const allQtrs=new Set();
    companies.forEach(c=>Object.keys(c.quarters).forEach(q=>allQtrs.add(q)));
    const quarters=[...allQtrs].sort().reverse().slice(0,8);
    let html='<table style="font-size:10.5px;width:100%;border-collapse:collapse;"><thead>'+
      '<tr style="background:#0f1923;color:#fff;"><th style="text-align:left;padding:10px 8px;border-radius:8px 0 0 0;">EMPRESA</th><th style="padding:10px 6px;">TICKER</th><th style="padding:10px 6px;">MONEDA</th><th style="padding:10px 6px;">MKT CAP</th>';
    quarters.forEach(q=>html+='<th colspan="4" style="text-align:center;padding:10px 4px;border-left:2px solid #1e2d40;">'+q+'</th>');
    html+='</tr><tr style="background:#162030;color:#94a3b8;font-size:9px;text-transform:uppercase;letter-spacing:.5px;"><th></th><th></th><th></th><th></th>';
    quarters.forEach(()=>html+='<th style="padding:6px 3px;border-left:2px solid #1e2d40;">Revenue</th><th style="padding:6px 3px;">EBITDA%</th><th style="padding:6px 3px;">Op%</th><th style="padding:6px 3px;">Net%</th>');
    html+='</tr></thead><tbody>';
    companies.forEach((c,i)=>{
      const hl=c.highlight;const bg=hl?'#f0fdf4':i%2===0?'#fff':'#f8fafc';
      html+='<tr style="background:'+bg+';border-left:4px solid '+(hl?'#00843D':'transparent')+';"><td style="text-align:left;padding:8px;font-weight:'+(hl?'800':'600')+';color:'+(hl?'#00843D':'#0f172a')+';white-space:nowrap;">'+(hl?'<span style="background:#00843D;color:#fff;padding:1px 5px;border-radius:3px;font-size:8px;margin-right:4px;">GL</span>':'')+c.name+'</td><td style="text-align:center;color:#64748b;font-weight:700;">'+c.ticker+'</td><td style="text-align:center;font-size:9.5px;">'+c.currency+'</td><td style="text-align:center;font-size:9.5px;color:#64748b;">'+(c.mktcap||'')+'</td>';
      quarters.forEach(q=>{const d=c.quarters[q];if(d){html+='<td style="text-align:right;padding:6px 4px;border-left:2px solid #e2e8f0;font-weight:600;">'+fv(d.rev)+'</td><td style="text-align:right;padding:6px 3px;'+cz(d.ebitdaMg)+';font-weight:700;">'+fp(d.ebitdaMg)+'</td><td style="text-align:right;padding:6px 3px;'+cz(d.opMg)+'">'+fp(d.opMg)+'</td><td style="text-align:right;padding:6px 3px;'+cz(d.netMg)+'">'+fp(d.netMg)+'</td>';}else{html+='<td style="border-left:2px solid #e2e8f0;" colspan="4"></td>';}});
      html+='</tr>';});
    return html+'</tbody></table>';
  }

  function buildSourcesList(cat){
    return BENCH_DATA[cat].map(c=>'<a href="'+(c.sourceUrl||'#')+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#f1f5f9;border-radius:5px;font-size:10px;color:#3b82f6;text-decoration:none;border:1px solid #e2e8f0;margin:2px;"><span style="font-weight:700;color:#0f172a;">'+c.ticker+'</span> '+(c.source||c.name)+'</a>').join('');
  }

  function buildKPICards(cat){
    const companies=BENCH_DATA[cat];const gl=companies.find(c=>c.highlight);if(!gl)return '';
    const lastQ=Object.values(gl.quarters)[0];
    const otherEbitda=companies.filter(c=>!c.highlight).map(c=>{const q=Object.values(c.quarters)[0];return q&&q.ebitdaMg!==null?q.ebitdaMg:null;}).filter(v=>v!==null);
    const avgEbitda=otherEbitda.length>0?(otherEbitda.reduce((a,b)=>a+b,0)/otherEbitda.length):0;
    const otherNet=companies.filter(c=>!c.highlight).map(c=>{const q=Object.values(c.quarters)[0];return q&&q.netMg!==null?q.netMg:null;}).filter(v=>v!==null);
    const avgNet=otherNet.length>0?(otherNet.reduce((a,b)=>a+b,0)/otherNet.length):0;
    const ebitdaRank=companies.filter(c=>{const q=Object.values(c.quarters)[0];return q&&q.ebitdaMg!==null;}).sort((a,b)=>(Object.values(b.quarters)[0].ebitdaMg||0)-(Object.values(a.quarters)[0].ebitdaMg||0)).findIndex(c=>c.highlight)+1;
    const netRank=companies.filter(c=>{const q=Object.values(c.quarters)[0];return q&&q.netMg!==null;}).sort((a,b)=>(Object.values(b.quarters)[0].netMg||0)-(Object.values(a.quarters)[0].netMg||0)).findIndex(c=>c.highlight)+1;
    return '<div class="kpi-row"><div class="kc" style="border-left:4px solid #00843D;"><div class="klbl">MARGEN EBITDA GL</div><div class="kval" style="color:#00843D;">'+lastQ.ebitdaMg.toFixed(1)+'%</div><div class="kch '+(lastQ.ebitdaMg>avgEbitda?'pos':'neg')+'">vs promedio '+avgEbitda.toFixed(1)+'%</div></div><div class="kc" style="border-left:4px solid #3b82f6;"><div class="klbl">MARGEN NETO GL</div><div class="kval" style="color:#3b82f6;">'+lastQ.netMg.toFixed(1)+'%</div><div class="kch '+(lastQ.netMg>avgNet?'pos':'neg')+'">vs promedio '+avgNet.toFixed(1)+'%</div></div><div class="kc" style="border-left:4px solid #f59e0b;"><div class="klbl">RANKING EBITDA</div><div class="kval">#'+ebitdaRank+'</div><div class="kch neu">de '+companies.filter(c=>{const q=Object.values(c.quarters)[0];return q&&q.ebitdaMg!==null;}).length+' empresas</div></div><div class="kc" style="border-left:4px solid #8b5cf6;"><div class="klbl">RANKING MARGEN NETO</div><div class="kval">#'+netRank+'</div><div class="kch neu">de '+companies.filter(c=>{const q=Object.values(c.quarters)[0];return q&&q.netMg!==null;}).length+' empresas</div></div></div>';
  }

  function buildEvolution(cat){
    const companies=BENCH_DATA[cat];
    const gl=companies.find(c=>c.highlight);if(!gl)return'';
    const qtrs=Object.keys(gl.quarters).sort();
    if(qtrs.length<2)return'';
    let html='<div class="cc" style="margin-bottom:18px;border-top:3px solid #00843D;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;"><span style="background:linear-gradient(135deg,#00843D,#00b356);color:#fff;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;">SERIE HISTORICA</span><div class="ct" style="font-size:15px;font-weight:800;margin:0;">Evolucion Historica Q1 2024 - Q4 2025</div></div><div style="font-size:10.5px;color:var(--t4);margin-bottom:12px;">Tendencias sostenidas, cambios estructurales y variaciones trimestrales a lo largo del periodo completo</div>';
    // GL evolution table
    html+='<table style="font-size:10.5px;width:100%;border-collapse:collapse;"><thead><tr style="background:#0f1923;color:#fff;"><th style="text-align:left;padding:8px;">Metrica</th>';
    qtrs.forEach(q=>html+='<th style="padding:8px;text-align:center;">'+q+'</th>');
    html+='<th style="padding:8px;text-align:center;">Tendencia</th></tr></thead><tbody>';
    const metrics=[{k:'rev',l:'Revenue',isP:false},{k:'ebitdaMg',l:'Mg EBITDA',isP:true},{k:'opMg',l:'Mg Operativo',isP:true},{k:'netMg',l:'Mg Neto',isP:true},{k:'revGrowth',l:'Crec. Revenue YoY',isP:true}];
    metrics.forEach(m=>{
      const vals=qtrs.map(q=>gl.quarters[q]?gl.quarters[q][m.k]:null);
      const validVals=vals.filter(v=>v!==null&&v!==undefined);
      let trend='—';
      if(validVals.length>=3){
        const first=validVals[0],last=validVals[validVals.length-1];
        const diff=last-first;
        if(m.isP){trend=diff>2?'<span style="color:#10b981;font-weight:700;">Mejora (+'+diff.toFixed(1)+' pp)</span>':diff<-2?'<span style="color:#ef4444;font-weight:700;">Deterioro ('+diff.toFixed(1)+' pp)</span>':'<span style="color:#94a3b8;">Estable</span>';}
        else{const pct=first>0?((last-first)/first*100):0;trend=pct>5?'<span style="color:#10b981;font-weight:700;">Crecimiento</span>':pct<-5?'<span style="color:#ef4444;font-weight:700;">Contraccion</span>':'<span style="color:#94a3b8;">Estable</span>';}
      }
      html+='<tr><td style="padding:6px 8px;font-weight:600;">'+m.l+'</td>';
      vals.forEach(v=>{
        const fVal=v!==null&&v!==undefined?(m.isP?v.toFixed(1)+'%':(v>=1000?(v/1000).toFixed(1)+'K':v.toLocaleString('en'))):'—';
        const clr=m.isP&&v!==null?(v>=0?'color:#10b981':'color:#ef4444'):'';
        html+='<td style="padding:6px 8px;text-align:center;'+clr+'">'+fVal+'</td>';
      });
      html+='<td style="padding:6px 8px;text-align:center;">'+trend+'</td></tr>';
    });
    html+='</tbody></table>';

    // Compare GL vs top 3 peers evolution
    const peers=companies.filter(c=>!c.highlight).filter(c=>Object.keys(c.quarters).length>=3).slice(0,3);
    if(peers.length>0){
      html+='<div style="margin-top:16px;"><div style="font-size:12px;font-weight:700;color:var(--t1);margin-bottom:8px;">Comparativo de Tendencias — Mg EBITDA</div>';
      html+='<table style="font-size:10.5px;width:100%;border-collapse:collapse;"><thead><tr style="background:#162030;color:#94a3b8;"><th style="text-align:left;padding:6px 8px;">Empresa</th>';
      qtrs.forEach(q=>html+='<th style="padding:6px;text-align:center;">'+q+'</th>');
      html+='</tr></thead><tbody>';
      [gl,...peers].forEach(c=>{
        const isGL=c.highlight;
        html+='<tr style="'+(isGL?'background:#f0fdf4;font-weight:700;':'')+'"><td style="padding:6px 8px;color:'+(isGL?'#00843D':'var(--t2)')+';">'+(isGL?'Genomma Lab':c.name)+'</td>';
        qtrs.forEach(q=>{
          const d=c.quarters[q];
          const v=d?d.ebitdaMg:null;
          html+='<td style="padding:6px;text-align:center;'+(v!==null?(v>=0?'color:#10b981':'color:#ef4444'):'color:#94a3b8')+';">'+(v!==null?v.toFixed(1)+'%':'—')+'</td>';
        });
        html+='</tr>';
      });
      html+='</tbody></table></div>';
    }

    // Key insights from evolution
    const firstQ=gl.quarters[qtrs[0]],lastQ=gl.quarters[qtrs[qtrs.length-1]];
    if(firstQ&&lastQ){
      const ebitdaChg=lastQ.ebitdaMg-firstQ.ebitdaMg;
      const revChg=firstQ.rev>0?((lastQ.rev-firstQ.rev)/firstQ.rev*100):0;
      html+=`<div style="margin-top:14px;padding:12px 16px;background:rgba(0,132,61,.04);border-radius:8px;border:1px solid rgba(0,132,61,.12);font-size:12px;line-height:1.7;color:var(--t2);">
        <strong style="color:var(--acc);">Hallazgos Clave de la Evolucion:</strong><br>
        <b>Revenue:</b> ${revChg>=0?'Crecimiento':'Contraccion'} del <b>${Math.abs(revChg).toFixed(1)}%</b> desde ${qtrs[0]} hasta ${qtrs[qtrs.length-1]}.<br>
        <b>Margen EBITDA:</b> ${ebitdaChg>=0?'Mejora':'Deterioro'} de <b>${Math.abs(ebitdaChg).toFixed(1)} pp</b> (de ${firstQ.ebitdaMg.toFixed(1)}% a ${lastQ.ebitdaMg.toFixed(1)}%).<br>
        <b>Margen Neto:</b> ${lastQ.netMg!==null&&firstQ.netMg!==null?(lastQ.netMg-firstQ.netMg>=0?'Mejora':'Deterioro')+' de <b>'+Math.abs(lastQ.netMg-firstQ.netMg).toFixed(1)+' pp</b>':'Datos parciales'}.<br>
        <b>Consistencia:</b> ${Math.abs(ebitdaChg)<3?'Margenes estables a lo largo del periodo — senal de disciplina operativa.':'Variacion significativa — revisar factores estacionales y extraordinarios.'}
      </div>`;
    }
    html+='</div>';
    return html;
  }

  document.getElementById('main').innerHTML=
  '<div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;"><div class="pg-title">Benchmarking Competitivo</div><span style="background:#00843D;color:#fff;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;">GENOMMA LAB vs INDUSTRIA</span></div>'+

// ═══════════════════ SIDEBAR ═══════════════════
function buildSidebar(){
  let h='';
  Object.entries(REGIONS).forEach(([rg,cos])=>{
    h+=`<div class="rg-lbl">${rg}</div>`;
    cos.forEach(co=>{
      const d23=RAW.annual['2023'][co],d24=RAW.annual['2024'][co],d25=RAW.annual['2025'][co];
      const s=overallStatus(d23,d24,d25);
      const dc=s==='green'?'dg':s==='yellow'?'dy':s==='red'?'dr':'dn';
      h+=`<div class="ci" id="ci-${co}" onclick="nav('country','${co}')"><div class="dot ${dc}"></div>${CNAMES[co]}</div>`;
    });
  });
  document.getElementById('cnt-nav').innerHTML=h;
}

function setActive(view,co){
  document.querySelectorAll('.sb-btn,.ci').forEach(e=>e.classList.remove('act'));
  if(view==='general')document.getElementById('btn-general').classList.add('act');
  else if(view==='consolidado')document.getElementById('btn-consolidado').classList.add('act');
  else if(view==='benchmark')document.getElementById('btn-benchmark').classList.add('act');
  else if(view==='ventas')document.getElementById('btn-ventas').classList.add('act');
  else if(co)document.getElementById('ci-'+co)?.classList.add('act');
}

// ═══════════════════ NAVIGATION ═══════════════════
let _cur={view:'general',co:null};
function nav(view,co=null){
  _cur={view,co};
  setActive(view,co);
  if(view==='general')renderGeneral();
  else if(view==='consolidado')renderConsolidado();
  else if(view==='benchmark')renderBenchmark();
  else if(view==='ventas')renderVentas();
  else if(view==='country')renderCountry(co);
  document.getElementById('main').scrollTop=0;
}

}
function wmOut(el,origColor){
  if(wmSelected&&el.dataset.co===wmSelected)return;
  el.style.filter='';el.style.strokeWidth='0.8';el.style.stroke='#fff';
  document.getElementById('wm-tip').style.display='none';
  document.querySelectorAll('.wm-bar').forEach(b=>{b.style.background='transparent';});
}
function wmClick(el,co){
  // Deselect previous
  if(wmSelected){
    document.querySelectorAll('#wm-svg path[data-co]').forEach(p=>{
      if(p.dataset.co===wmSelected){p.style.filter='';p.style.strokeWidth='0.8';p.style.stroke='#fff';}
    });
  }
  if(wmSelected===co){wmSelected=null;return;}
  wmSelected=co;
  el.style.filter='brightness(1.2) drop-shadow(0 4px 16px rgba(0,0,0,.4))';
  el.style.strokeWidth='2.5';el.style.stroke='#f59e0b';
  // Navigate to country detail
  setTimeout(()=>nav('country',co),600);
}

function generateInvestorReport(co,nm,v25,v24,c25,c24,ub25,ub24,eb25,eb24,eit25,eit24,un25,un24){
  const totV25=v25.reduce((a,b)=>a+b,0), totV24=v24.reduce((a,b)=>a+b,0);
  const totC25=c25.reduce((a,b)=>a+b,0), totC24=c24.reduce((a,b)=>a+b,0);
  const totUb25=ub25.reduce((a,b)=>a+b,0), totUb24=ub24.reduce((a,b)=>a+b,0);
  const totEb25=eb25.reduce((a,b)=>a+b,0), totEb24=eb24.reduce((a,b)=>a+b,0);
  const totEit25=eit25.reduce((a,b)=>a+b,0), totEit24=eit24.reduce((a,b)=>a+b,0);
  const totUn25=un25.reduce((a,b)=>a+b,0), totUn24=un24.reduce((a,b)=>a+b,0);
  const vChg=chg(totV24,totV25), ebChg=chg(totEb24,totEb25), unChg=chg(totUn24,totUn25);
  const ubChg=chg(totUb24,totUb25);
  const mgUb25=totV25?totUb25/totV25:0, mgUb24=totV24?totUb24/totV24:0;
  const mgEb25=totV25?totEb25/totV25:0, mgEb24=totV24?totEb24/totV24:0;
  const mgUn25=totV25?totUn25/totV25:0, mgUn24=totV24?totUn24/totV24:0;
  const hl=(v,ref)=>{const c=chg(ref,v);return c!==null?(c>=0?'inv-up':'inv-dn'):'';};
  const dir=(c)=>c!==null?(c>0?'un incremento':'una disminución'):'una variación';
  const dirV=(c)=>c!==null?(c>0?'creció':'disminuyó'):'se mantuvo';
  const dirP=(c)=>c!==null?(c>0?'se expandió':'se contrajo'):'se mantuvo';
  const fAbs=(v)=>fmt(Math.abs(v));
  const fPctAbs=(v)=>v!==null?Math.abs(v*100).toFixed(1)+'%':'n/d';
  const ppDiff=(a,b)=>((a-b)*100).toFixed(1);
  // Best and worst quarters
  const bestQ=v25.indexOf(Math.max(...v25));
  const worstQ=v25.indexOf(Math.min(...v25.filter(v=>v>0)));
  const qNames=['primer trimestre','segundo trimestre','tercer trimestre','cuarto trimestre'];
  const qShort=['1T','2T','3T','4T'];
  // Quarter-by-quarter narrative
  let qNarr=v25.map((v,i)=>{
    const vc=chg(v24[i],v);
    const ebc=chg(eb24[i],eb25[i]);
    const mgQ=v?eb25[i]/v:0;
    return `En el <strong>${qNames[i]}</strong>, las ventas netas se ubicaron en <span class="inv-num">${fmt(v)} MM</span> (<span class="${hl(v,v24[i])}">${fmtPct(vc)} vs ${qShort[i]} 2024</span>), con un EBITDA de <span class="inv-num">${fmt(eb25[i])} MM</span> y un margen EBITDA de <span class="inv-num">${(mgQ*100).toFixed(1)}%</span>.`;
  }).join(' ');

  // Determine overall tone
  const toneClass=vChg!==null?(vChg>=0?'positive':'cautious'):'neutral';
  const overallWord=vChg!==null?(vChg>0?'favorable':'desafiante'):'mixto';

  return `
  <div class="inv-report">
    <div class="inv-report-hdr">
      <div class="inv-logo">GL</div>
      <div class="inv-hdr-txt">
        <h3>Genomma Lab Internacional, S.A.B. de C.V. y Subsidiarias</h3>
        <p>Reporte de Resultados ${nm} &mdash; Ejercicio 2025 vs 2024 &middot; Cifras en millones de pesos mexicanos</p>
      </div>
    </div>

    <div class="inv-highlight">
      <div class="inv-hl-item">
        <div class="hl-val">${fmt(totV25)}</div>
        <div class="hl-sub">Ventas Netas 2025</div>
        <div class="hl-chg ${hl(totV25,totV24)}">${arrow(vChg)} ${fmtPct(vChg)} vs 2024</div>
      </div>
      <div class="inv-hl-item">
        <div class="hl-val">${fmt(totEb25)}</div>
        <div class="hl-sub">EBITDA 2025</div>
        <div class="hl-chg ${hl(totEb25,totEb24)}">${arrow(ebChg)} ${fmtPct(ebChg)} vs 2024</div>
      </div>
      <div class="inv-hl-item">
        <div class="hl-val">${(mgEb25*100).toFixed(1)}%</div>
        <div class="hl-sub">Margen EBITDA</div>
        <div class="hl-chg ${mgEb25>=mgEb24?'inv-up':'inv-dn'}">${mgEb25>=mgEb24?'▲':'▼'} ${ppDiff(mgEb25,mgEb24)} pp vs 2024</div>
      </div>
      <div class="inv-hl-item">
        <div class="hl-val">${fmt(totUn25)}</div>
        <div class="hl-sub">Utilidad Neta 2025</div>
        <div class="hl-chg ${hl(totUn25,totUn24)}">${arrow(unChg)} ${fmtPct(unChg)} vs 2024</div>
      </div>
    </div>

    <div class="inv-section">
      <div class="inv-section-title">Desempe\u00f1o en Ventas</div>
      <div class="inv-text">
        Durante el ejercicio 2025, la operaci\u00f3n de <strong>${nm}</strong> registr\u00f3 ventas netas por <span class="inv-num">${fmt(totV25)} millones de pesos</span>, lo que representa <span class="${hl(totV25,totV24)}">${dir(vChg)} de ${fPctAbs(vChg)}</span> respecto al mismo periodo del a\u00f1o anterior, cuando las ventas netas ascendieron a <span class="inv-num">${fmt(totV24)} MM</span>. ${totV25>totV24?'Este crecimiento refleja la s\u00f3lida ejecuci\u00f3n comercial y el posicionamiento de nuestras marcas en el mercado.':'Esta variaci\u00f3n refleja las condiciones del entorno competitivo y macroecon\u00f3mico que impactaron la operaci\u00f3n durante el periodo.'}
      </div>
    </div>

    <div class="inv-section">
      <div class="inv-section-title">Rentabilidad y M\u00e1rgenes</div>
      <div class="inv-text">
        La <strong>utilidad bruta</strong> se ubic\u00f3 en <span class="inv-num">${fmt(totUb25)} MM</span> (<span class="${hl(totUb25,totUb24)}">${fmtPct(ubChg)} vs 2024</span>), con un margen bruto de <span class="inv-num">${(mgUb25*100).toFixed(1)}%</span> comparado con <span class="inv-num">${(mgUb24*100).toFixed(1)}%</span> en 2024 (${ppDiff(mgUb25,mgUb24)} puntos porcentuales). El <strong>EBITDA</strong> alcanz\u00f3 <span class="inv-num">${fmt(totEb25)} MM</span>, lo que representa <span class="${hl(totEb25,totEb24)}">${dir(ebChg)} de ${fPctAbs(ebChg)}</span> respecto al ejercicio anterior. El margen EBITDA ${dirP(mgEb25-mgEb24>=0?1:-1)} a <span class="inv-num">${(mgEb25*100).toFixed(1)}%</span> desde <span class="inv-num">${(mgEb24*100).toFixed(1)}%</span>, equivalente a ${Math.abs(parseFloat(ppDiff(mgEb25,mgEb24)))} puntos porcentuales.
      </div>
    </div>

    <div class="inv-section">
      <div class="inv-section-title">Resultado Neto</div>
      <div class="inv-text">
        La <strong>utilidad neta</strong> del periodo ascendi\u00f3 a <span class="inv-num">${fmt(totUn25)} MM</span>, comparada con <span class="inv-num">${fmt(totUn24)} MM</span> en 2024, lo que implica <span class="${hl(totUn25,totUn24)}">${dir(unChg)} de ${fPctAbs(unChg)}</span>. El margen neto se ubic\u00f3 en <span class="inv-num">${(mgUn25*100).toFixed(1)}%</span> frente a <span class="inv-num">${(mgUn24*100).toFixed(1)}%</span> del a\u00f1o previo (${ppDiff(mgUn25,mgUn24)} pp).
      </div>
    </div>

    <div class="inv-section">
      <div class="inv-section-title">An\u00e1lisis Trimestral</div>
      <div class="inv-text">
        ${qNarr}
        <br><br>El trimestre con mayor volumen de ventas fue el <strong>${qNames[bestQ]}</strong> con <span class="inv-num">${fmt(v25[bestQ])} MM</span>${worstQ!==bestQ?', mientras que el '+qNames[worstQ]+' registr\u00f3 el menor nivel con <span class="inv-num">'+fmt(v25[worstQ])+' MM</span>':''}.
      </div>
    </div>

    <div class="inv-disclaimer">
      Nota: Las cifras presentadas corresponden al consolidado de ${nm} dentro de Genomma Lab Internacional, S.A.B. de C.V. y Subsidiarias. Los importes est\u00e1n expresados en millones de pesos mexicanos (MM MXN) y han sido extra\u00eddos de los estados financieros consolidados (Hoja C). Los porcentajes de variaci\u00f3n se calculan respecto al periodo comparable del ejercicio inmediato anterior. Este reporte es generado con fines de an\u00e1lisis interno y no constituye una comunicaci\u00f3n oficial al mercado de valores.
    </div>
  </div>`;
}

function renderQuarterlyTab(co){
  const el=document.getElementById('tab-qtr-'+co);
  if(!el||!QTD)return;
  const nm=CNAMES[co];
  const offset=getOffset(co);
  const colBase=418+offset;

  // ---- Quarterly incremental data ----
  const v25=qIncrMetric('2025',co,'ventas'),  v24=qIncrMetric('2024',co,'ventas');
  const c25=qIncrMetric('2025',co,'costo'),   c24=qIncrMetric('2024',co,'costo');
  const ub25=qIncrMetric('2025',co,'ub'),     ub24=qIncrMetric('2024',co,'ub');
  const eb25=qIncrMetric('2025',co,'ebitda'), eb24=qIncrMetric('2024',co,'ebitda');
  const eit25=qIncrMetric('2025',co,'ebit'),  eit24=qIncrMetric('2024',co,'ebit');
  const un25=qIncrMetric('2025',co,'un'),     un24=qIncrMetric('2024',co,'un');
  const totV25=v25.reduce((a,b)=>a+b,0), totV24=v24.reduce((a,b)=>a+b,0);
  const totEb25=eb25.reduce((a,b)=>a+b,0), totEb24=eb24.reduce((a,b)=>a+b,0);
  const totUn25=un25.reduce((a,b)=>a+b,0), totUn24=un24.reduce((a,b)=>a+b,0);

  // ---- Monthly all metrics 2025 (incremental) ----
  const mv25_cum=qMonthlyMetric('2025',co,'ventas');
  const mc25_cum=qMonthlyMetric('2025',co,'costo');
  const meb25_cum=qMonthlyMetric('2025',co,'ebitda');
  const mv24_cum=qMonthlyMetric('2024',co,'ventas');
  const mv25=mv25_cum.map((v,i)=>i===0?v:v-mv25_cum[i-1]);
  const mc25=mc25_cum.map((v,i)=>i===0?v:v-mc25_cum[i-1]);
  const meb25=meb25_cum.map((v,i)=>i===0?v:v-meb25_cum[i-1]);
  // 2024 monthly: valid from index 2 (March) onwards (indices 0,1 are invalid in source)
  const mv24_valid=mv24_cum.map((v,i)=>{
    if(i<2)return null; // Jan/Feb 2024 invalid in source
    const prev=i===0?0:(mv24_cum[i-1]||0);
    const inc=v-prev;
    return (inc<0||inc>mv24_cum[mv24_cum.length-1])?null:inc;
  });

  // ---- Quarterly P&L Summary Table ----
  function qRow(lbl,arr25,arr24,isBold,isNeg){
    const tot25=arr25.reduce((a,b)=>a+b,0),tot24=arr24.reduce((a,b)=>a+b,0);
    const vtot=chg(tot24,tot25);
    const bf=isBold?'style="font-weight:800"':'';
    const cells=arr25.map((v,i)=>{
      const v4=arr24[i],vc=chg(v4,v);
      return `<td class="q25 ${v<0?'nv':''}">${fmt(v)}</td>
              <td class="q24 ${v4<0?'nv':''}">${fmt(v4)}</td>
              <td class="qvar ${vc!==null?(vc>=0?'pos':'neg'):'neu'}">${fmtPct(vc)}</td>`;
    }).join('');
    return `<tr ${bf}><td ${bf}>${lbl}</td>${cells}
      <td class="q25 ${tot25<0?'nv':''}">${fmt(tot25)}</td>
      <td class="q24 ${tot24<0?'nv':''}">${fmt(tot24)}</td>
      <td class="qvar ${vtot!==null?(vtot>=0?'pos':'neg'):'neu'}">${fmtPct(vtot)}</td></tr>`;
  }
  function qMgRow(lbl,numArr25,numArr24,denArr25,denArr24){
    const cells=[0,1,2,3].map(i=>{
      const mg25n=denArr25[i]?numArr25[i]/denArr25[i]:null;
      const mg24n=denArr24[i]?numArr24[i]/denArr24[i]:null;
      const diff=mg25n!==null&&mg24n!==null?(mg25n-mg24n):null;
      return `<td class="q25">${mg25n!==null?fmtPct(mg25n,false):'-'}</td>
              <td class="q24">${mg24n!==null?fmtPct(mg24n,false):'-'}</td>
              <td class="qvar ${diff!==null?(diff>=0?'pos':'neg'):'neu'}">${diff!==null?(diff>=0?'+':'')+((diff)*100).toFixed(1)+'pp':'-'}</td>`;
    }).join('');
    const tMg25=totV25?totEb25/totV25:null,tMg24=totV24?totEb24/totV24:null;
    const tdiff=tMg25!==null&&tMg24!==null?(tMg25-tMg24):null;
    return `<tr><td>${lbl}</td>${cells}
      <td class="q25">${tMg25!==null?fmtPct(tMg25,false):'-'}</td>
      <td class="q24">${tMg24!==null?fmtPct(tMg24,false):'-'}</td>
      <td class="qvar ${tdiff!==null?(tdiff>=0?'pos':'neg'):'neu'}">${tdiff!==null?(tdiff>=0?'+':'')+((tdiff)*100).toFixed(1)+'pp':'-'}</td></tr>`;
  }

  // ---- R Codes detail table ----
  function rCodeRows(){
    return Object.entries(R_LABELS).map(([code,lbl])=>{
      const arr25=qRCode('2025',co,code),arr24=qRCode('2024',co,code);
      const tot25=arr25.reduce((a,b)=>a+b,0),tot24=arr24.reduce((a,b)=>a+b,0);
      const vtot=chg(tot24,tot25);
      const isBold=R_BOLD.includes(code);
      const bf=isBold?'style="font-weight:800;background:#f8fafc"':'';
      const cells=arr25.map((v,i)=>{
        const v4=arr24[i],vc=chg(v4,v);

      return `<tr ${bf}><td ${bf} style="${isBold?'font-weight:800':''}">${lbl}</td>${cells}
        <td class="q25 ${tot25<0?'nv':''}">${fmt(tot25)}</td>

        <td class="qvar ${vtot!==null?(vtot>=0?'pos':'neg'):'neu'}">${fmtPct(vtot)}</td></tr>`;
    }).join('');
  }

  // ---- Monthly variation table ----
  function monthlyVarRows(){
    return MONTHS.map((m,i)=>{
      const v=mv25[i],cost=mc25[i],eb=meb25[i];
      const vPrev=i>0?mv25[i-1]:null;
      const dPrev=vPrev!==null&&vPrev!==0?chg(vPrev,v):null;
      const v24=mv24_valid[i];

      const sem=dYoy!==null?(dYoy>=0?'<span class="qbadge qbg">▲</span>':'<span class="qbadge qbr">▼</span>'):'';
      return `<tr>
        <td>${m}</td>

        <td class="${eb>=0?'pos':'neg'}">${v?fmtPct(eb/v,false):'-'}</td>
      </tr>`;
    }).join('');
  }

  // Header row helper (4 quarters + total)
  const qHdrs=`<th colspan="3" class="hdr25">Q1 2025 vs Q1 2024</th><th colspan="3" class="hdr25">Q2 2025 vs Q2 2024</th><th colspan="3" class="hdr25">Q3 2025 vs Q3 2024</th><th colspan="3" class="hdr25">Q4 2025 vs Q4 2024</th><th colspan="3" class="hdrv">TOTAL 2025 vs 2024</th>`;
  const qSubHdrs=`${'<th class="hdr25">2025</th><th class="hdr24">2024</th><th class="hdrv">Var%</th>'.repeat(5)}`;

  // Generate investor report
  const investorHTML=generateInvestorReport(co,nm,v25,v24,c25,c24,ub25,ub24,eb25,eb24,eit25,eit24,un25,un24);

  el.innerHTML=`
  <div class="pg-title">${nm} — Analíticas Trimestrales</div>
  <div class="pg-sub">Comparativo trimestral incremental · Cifras en MM MXN · Fuente: Hoja C de archivos consolidados</div>

  <!-- INVESTOR NARRATIVE REPORT -->
  ${investorHTML}

  <!-- QUARTERLY KPIs -->
  <div class="qkpi">
    ${[0,1,2,3].map(i=>`<div class="kc">
      <div class="klbl">${Q_LABELS[i]} — Ventas 2025</div>
      <div class="kval ${v25[i]<0?'nv':''}">${fmt(v25[i])}</div>
      <div class="kch ${chg(v24[i],v25[i])!==null?(chg(v24[i],v25[i])>=0?'pos':'neg'):'neu'}">${arrow(chg(v24[i],v25[i]))} ${fmtPct(chg(v24[i],v25[i]))} vs 2024</div>
    </div>`).join('')}
  </div>

  <!-- QUARTERLY P&L SUMMARY TABLE -->
  <div class="sdiv"><hr><span>Estado de Resultados Trimestral (Incremental MM MXN)</span><hr></div>
  <div class="src" style="margin-bottom:10px"><b>📌 Fuente:</b> Hoja C · Bloques Q1=col85, Q2=col196, Q3=col307, Q4=col418 · Offset país: +${offset} → Cols Excel: ${85+offset+1}, ${196+offset+1}, ${307+offset+1}, ${418+offset+1} (base 1) · Incrementales: Q1=YTD_Q1, Q2=YTD_Q2−YTD_Q1, Q3=YTD_Q3−YTD_Q2, Q4=YTD_Q4−YTD_Q3 · Filas 2025: V=318, C=330, UB=337, EBITDA=410, EBIT=418, UN=456 · Filas 2024: V=297, C=307, UB=312, EBITDA=390, EBIT=398, UN=429</div>
  <div class="tc" style="overflow-x:auto"><table class="qtbl">
    <thead>
      <tr><th style="text-align:left;min-width:150px">Concepto</th>${qHdrs}</tr>
      <tr><th></th>${qSubHdrs}</tr>
    </thead>
    <tbody>
      ${qRow('Ventas Netas',v25,v24,true,false)}
      ${qRow('Costo de Ventas',c25,c24,false,false)}
      ${qRow('Utilidad Bruta',ub25,ub24,true,false)}
      ${qMgRow('  Margen Bruto %',ub25,ub24,v25,v24)}
      ${qRow('EBITDA',eb25,eb24,true,false)}
      ${qMgRow('  Margen EBITDA %',eb25,eb24,v25,v24)}
      ${qRow('EBIT',eit25,eit24,false,false)}
      ${qRow('Utilidad Neta',un25,un24,true,false)}
      ${qMgRow('  Margen Neto %',un25,un24,v25,v24)}

  <!-- QUARTERLY CHARTS -->

function renderTrendChart(id,t,unit){
  const labels=['2023','2024','2025'];
  const actualData=[t.y23,t.y24,t.y25];
  const expData=[null,null,t.canCalc?t.exp:null];
  const expLine=[null,t.y24,t.canCalc?t.exp:null];
  const sc=t.status==='green'?'#10b981':t.status==='yellow'?'#f59e0b':'#ef4444';
  mkChart(id,{
    type:'line',
    data:{labels,datasets:[
      {label:'Real',data:actualData,borderColor:'#00843D',backgroundColor:'rgba(0,132,61,.1)',fill:true,tension:.2,pointRadius:6,pointBackgroundColor:'#00843D',borderWidth:2.5},
      {label:'Tendencia esperada',data:expLine,borderColor:sc,borderDash:[6,4],tension:0,pointRadius:[0,0,8],pointBackgroundColor:sc,pointBorderColor:'#fff',pointBorderWidth:2,fill:false,borderWidth:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:10}}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)} ${unit}`}}},
      scales:{y:{ticks:{callback:v=>`${fmt(v)}`,font:{size:9}},grid:{color:'#f1f5f9'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}
  });
}

function pnlRows(d23,d24,d25){
  const rows=[
    {lbl:'Ventas Netas',f:'v',bold:true},
    {lbl:'Costo de Ventas',f:'c',bold:false,neg:true},
    {lbl:'Utilidad Bruta',f:'ub',bold:true},
    {lbl:'EBITDA',f:'eb',bold:true},
    {lbl:'EBIT',f:'eit',bold:false},
    {lbl:'Utilidad Neta',f:'un',bold:true}
  ];
  return rows.map(r=>{
    const v3=d23[r.f],v4=d24[r.f],v5=d25[r.f];
    const c34=chg(v3,v4),c45=chg(v4,v5);
    const mg3=d23.v?v3/d23.v:null,mg4=d24.v?v4/d24.v:null,mg5=d25.v?v5/d25.v:null;
    const bf=r.bold?'style="font-weight:800"':'';
    return `<tr ${bf}>
      <td style="${r.bold?'font-weight:800':''}">${r.lbl}</td>
      <td class="${v3<0?'nv':''}">${fmt(v3)}</td>
      <td class="${v4<0?'nv':''}">${fmt(v4)}</td>
      <td class="${v5<0?'nv':''}">${fmt(v5)}</td>
      <td class="${cls(c34)}">${fmtPct(c34)}</td>
      <td class="${cls(c45)}">${fmtPct(c45)}</td>
      <td>${mg3!==null?fmtPct(mg3,false):'-'}</td>
      <td>${mg4!==null?fmtPct(mg4,false):'-'}</td>
      <td>${mg5!==null?fmtPct(mg5,false):'-'}</td>
    </tr>`;
  }).join('');
}

function getOffset(co){
  const map={"Mexico":3,"USA":18,"Guatemala":19,"Costa Rica":23,"Panama":24,"Rep. Dom.":25,"Peru":26,"Argentina":27,"Brasil":28,"Chile":29,"Colombia":30,"Bolivia":31,"Ecuador":32,"Paraguay":33,"Uruguay":34,"Espana":36};
  return map[co]||0;
}

function buildAlerts(co,d25,d24,d23,tr,vch,ebch,unch,mg25,mg24){
  const alerts=[];
  // Trend alerts
  Object.values(tr).forEach(r=>{
    if(r.status==='red'&&r.canCalc){
      alerts.push({cls:'alr-r',icon:'🔴',msg:`<b>${r.label}</b>: desviación de <b>${fmtPct(r.dev)}</b> vs valor esperado (esp. ${fmt(r.exp)} vs real ${fmt(r.y25)} MM MXN). Requiere atención inmediata.`});
    } else if(r.status==='yellow'&&r.canCalc){
      alerts.push({cls:'alr-y',icon:'🟡',msg:`<b>${r.label}</b>: desviación moderada de <b>${fmtPct(r.dev)}</b> vs valor esperado (${fmt(r.exp)} MM esperado). Monitorear de cerca.`});
    }
  });
  // Absolute alerts
  if(d25.eb<0)alerts.push({cls:'alr-r',icon:'🔴',msg:`<b>EBITDA negativo</b> en 2025: ${fmt(d25.eb)} MM MXN. La operación no genera flujo operativo.`});
  if(d25.un<0&&d25.eb>0)alerts.push({cls:'alr-y',icon:'🟡',msg:`<b>Utilidad Neta negativa</b> (${fmt(d25.un)} MM) pese a EBITDA positivo (${fmt(d25.eb)} MM). Revisar cargas financieras y fiscales.`});
  if(d25.c/d25.v>0.55)alerts.push({cls:'alr-y',icon:'🟡',msg:`<b>Costo de ventas elevado</b>: representa el ${fmtPct(d25.c/d25.v,false)} de las ventas en 2025.`});
  if(vch!==null&&vch<-0.15)alerts.push({cls:'alr-r',icon:'🔴',msg:`<b>Caída significativa en ventas</b>: ${fmtPct(vch)} vs 2024.`});
  if(vch!==null&&vch>0.20)alerts.push({cls:'alr-g',icon:'✅',msg:`<b>Crecimiento sólido en ventas</b>: +${fmtPct(vch)} vs 2024. Tendencia positiva.`});
  if(alerts.length===0)alerts.push({cls:'alr-g',icon:'✅',msg:`Desempeño dentro de rangos normales en todas las métricas clave. Sin alertas críticas.`});
  return alerts;
}

  if(typeof VENTAS_MARCA!=='undefined'){

    Object.keys(VENTAS_MARCA).forEach(co=>{

        ctx+=`${CNAMES[co]||co}: ${brands.map(b=>`${b.b}(${b.s},${(b.tv/M).toFixed(1)}MM)`).join(', ')}\n`;
      }
    });

      (VENTAS_MARCA[co]||[]).forEach(br=>{
        const k=br.b.toUpperCase();
        if(!globalMap[k])globalMap[k]={name:br.b,seg:br.s,tv:0};
        globalMap[k].tv+=br.tv/M;
      });
    });
    const topGlobal=Object.values(globalMap).sort((a,b)=>b.tv-a.tv).slice(0,15);
    topGlobal.forEach((b,i)=>{ctx+=`${i+1}. ${b.name} (${b.seg}): ${b.tv.toFixed(1)} MM\n`;});
  }
  // Segmentos
  if(typeof VENTAS_SEGMENTO!=='undefined'){
    ctx+=`\nSEGMENTOS POR PAIS:\n`;
    Object.keys(VENTAS_SEGMENTO).forEach(co=>{
      const s=VENTAS_SEGMENTO[co];
      ctx+=`${co}: OTC=${(s.otcV/1e6).toFixed(1)}MM, PC=${(s.pcV/1e6).toFixed(1)}MM, Total=${(s.totV/1e6).toFixed(1)}MM\n`;
    });
  }
  // Benchmarking
  if(typeof BENCH_DATA!=='undefined'){
    ctx+=`\nBENCHMARKING COMPETITIVO (cifras en moneda local del competidor):\n`;
    Object.keys(BENCH_DATA).forEach(cat=>{
      ctx+=`Categoria ${cat.toUpperCase()}:\n`;
      BENCH_DATA[cat].forEach(co=>{
        const qs=Object.keys(co.quarters);
        const latest=qs[0];const d=co.quarters[latest];
        ctx+=`  ${co.name} (${co.ticker},${co.currency}): ${latest} Rev=${d.rev}, EBITDAMg=${d.ebitdaMg}%, OpMg=${d.opMg}%, NetMg=${d.netMg}%, RevGrowth=${d.revGrowth}%\n`;
      });
    });
  }

  ctx+=`\nDATOS MENSUALES YTD 2025 (acumulado por mes, en MM MXN):\n`;
  ACTIVE.forEach(co=>{
    const m=RAW.monthly_cum[co];
    if(m){ctx+=`${CNAMES[co]||co}: ${m.map((v,i)=>`M${i+1}=${v.toFixed(1)}`).join(', ')}\n`;}
  });
  return ctx;
}

function detectCountry(q){
  const ql=q.toLowerCase();
  // Try longest matches first
  const keys=Object.keys(CH_COUNTRIES).sort((a,b)=>b.length-a.length);
  for(const k of keys){if(ql.includes(k))return CH_COUNTRIES[k];}
  return null;
}
function detectTwoCountries(q){
  const ql=q.toLowerCase();
  const keys=Object.keys(CH_COUNTRIES).sort((a,b)=>b.length-a.length);
  const found=[];const used=new Set();
  for(const k of keys){
    if(ql.includes(k)&&!used.has(CH_COUNTRIES[k])){found.push(CH_COUNTRIES[k]);used.add(CH_COUNTRIES[k]);if(found.length>=2)break;}
  }
  return found;
}
function detectMetric(q){
  const ql=q.toLowerCase();
  const keys=Object.keys(CH_METRICS).sort((a,b)=>b.length-a.length);
  for(const k of keys){if(ql.includes(k))return CH_METRICS[k];}
  return null;
}

  const ql=q.toLowerCase();

  // ── DASHBOARD EXPLANATION queries ──

  // ── BENCHMARK / COMPETITOR queries ──

  }

  // ── FILTER / THRESHOLD queries ──
  if(ql.match(/pa[ií]ses?\s+(con|que|donde|cuyo)|arriba\s+de|mayor\s+a|superior\s+a|por\s+encima|above|más de \d/)){
    const m5=detectMetric(q)||'mg_ebitda';
    const yr5=detectYear(q)||'2025';
    const numMatch=ql.match(/(\d+[.,]?\d*)\s*%?/);
    const threshold=numMatch?parseFloat(numMatch[1].replace(',','.')):20;
    const isM5=isMgMetric(m5);
    const results=ACTIVE.map(co=>{const d=getAnnual(co,yr5);if(!d||d.ventas===0)return null;return{co,val:getMetricVal(d,m5)};}).filter(x=>x&&x.val>threshold).sort((a,b)=>b.val-a.val);
    if(results.length>0){
      let tbl=`<table class="ch-tbl"><tr><th>#</th><th>Pais</th><th>${METRIC_NAMES[m5]}</th></tr>`;
      results.forEach((x,i)=>{tbl+=`<tr><td>${i+1}</td><td>${CNAMES[x.co]}</td><td>${isM5?x.val.toFixed(1)+'%':fmtC(x.val)+' MM'}</td></tr>`;});
      tbl+='</table>';
      addBot(`<strong>Paises con ${METRIC_NAMES[m5]} mayor a ${isM5?threshold+'%':fmtC(threshold)+' MM'} (${yr5}):</strong>${tbl}<div style="font-size:10px;color:#64748b;">${results.length} de ${ACTIVE.length} paises cumplen el criterio.</div>`);
      return;
    }
  }

  // ── TOP / RANKING queries ──
  if(ql.match(/top\s*\d|ranking|mayores|mejores|más vend|mas vend|principales|lider|líder/)){
    const n=parseInt((ql.match(/top\s*(\d+)/)||[,'5'])[1]);
    const m=detectMetric(q)||'ventas';
    const yr=detectYear(q)||'2025';
    const sorted=ACTIVE.map(co=>{const d=getAnnual(co,yr);return d?{co,val:getMetricVal(d,m)}:null;}).filter(x=>x&&x.val>0).sort((a,b)=>b.val-a.val).slice(0,n);
    const isM=isMgMetric(m);
    let tbl=`<table class="ch-tbl"><tr><th>#</th><th>País</th><th>${METRIC_NAMES[m]} ${yr}</th></tr>`;
    sorted.forEach((x,i)=>{tbl+=`<tr><td>${i+1}</td><td>${CNAMES[x.co]}</td><td>${isM?x.val.toFixed(1)+'%':fmtC(x.val)+' MM'}</td></tr>`;});
    tbl+='</table>';
    addBot(`<strong>Top ${sorted.length} países por ${METRIC_NAMES[m]} (${yr}):</strong>${tbl}`);
    return;
  }

  // ── COMPARE two countries ──
  if(ql.match(/compar|vs\b|versus|contra|diferencia entre/)){
    const two=detectTwoCountries(q);
    if(two.length===2){
      const yr=detectYear(q)||'2025';
      const d1=getAnnual(two[0],yr),d2=getAnnual(two[1],yr);
      if(d1&&d2){
        const n1=CNAMES[two[0]],n2=CNAMES[two[1]];
        let tbl=`<table class="ch-tbl"><tr><th>Métrica</th><th>${n1}</th><th>${n2}</th><th>Dif.</th></tr>`;
        [{k:'ventas',l:'Ventas'},{k:'ebitda',l:'EBITDA'},{k:'utilidad_neta',l:'Ut. Neta'}].forEach(r=>{
          const v1=d1[r.k],v2=d2[r.k],df=v1-v2;
          tbl+=`<tr><td>${r.l}</td><td>${fmtC(v1)}</td><td>${fmtC(v2)}</td><td style="${df>=0?'color:#10b981':'color:#ef4444'}">${df>=0?'+':''}${fmtC(df)}</td></tr>`;
        });
        const mg1=d1.ventas?d1.ebitda/d1.ventas*100:0,mg2=d2.ventas?d2.ebitda/d2.ventas*100:0;
        tbl+=`<tr><td>Mg EBITDA</td><td>${mg1.toFixed(1)}%</td><td>${mg2.toFixed(1)}%</td><td>${(mg1-mg2)>=0?'+':''}${(mg1-mg2).toFixed(1)}pp</td></tr></table>`;
        addBot(`<strong>Comparativo ${n1} vs ${n2} (${yr}):</strong>${tbl}`);
        return;
      }
    }
  }

  // ── GROWTH / best performer ──
  if(ql.match(/creci|mayor crecimiento|más creci|mas creci|mejor desempeño|mejor rendimiento|quien crec|quién crec/)){
    const m=detectMetric(q)||'ventas';
    const sorted=ACTIVE.map(co=>{
      const d25=getAnnual(co,'2025'),d24=getAnnual(co,'2024');
      if(!d25||!d24)return null;
      const v25=getMetricVal(d25,m),v24=getMetricVal(d24,m);
      const chg=v24?(v25-v24)/Math.abs(v24)*100:null;
      return{co,v25,chg};
    }).filter(x=>x&&x.chg!==null&&x.v25>0).sort((a,b)=>b.chg-a.chg);
    if(sorted.length>0){
      const top5=sorted.slice(0,5);
      const isM=isMgMetric(m);
      let tbl=`<table class="ch-tbl"><tr><th>#</th><th>País</th><th>${METRIC_NAMES[m]}</th><th>Var%</th></tr>`;
      top5.forEach((x,i)=>{tbl+=`<tr><td>${i+1}</td><td>${CNAMES[x.co]}</td><td>${isM?x.v25.toFixed(1)+'%':fmtC(x.v25)+' MM'}</td><td style="${clrVar(x.chg)}">${fmtVar(x.chg)}</td></tr>`;});
      tbl+='</table>';
      addBot(`<strong>Países con mayor crecimiento en ${METRIC_NAMES[m]} (2025 vs 2024):</strong>${tbl}`);
      return;
    }
  }

  // ── WORST / decline ──
  if(ql.match(/peor|cayó|cayo|caída|caida|baj|declin|menor|perdió|perdio|más afect|mas afect/)){
    const m=detectMetric(q)||'ventas';
    const sorted=ACTIVE.map(co=>{
      const d25=getAnnual(co,'2025'),d24=getAnnual(co,'2024');
      if(!d25||!d24)return null;
      const v25=getMetricVal(d25,m),v24=getMetricVal(d24,m);
      const chg=v24?(v25-v24)/Math.abs(v24)*100:null;
      return{co,v25,chg};
    }).filter(x=>x&&x.chg!==null&&x.v25>0).sort((a,b)=>a.chg-b.chg);
    if(sorted.length>0){
      const top5=sorted.slice(0,5);
      const isM=isMgMetric(m);
      let tbl=`<table class="ch-tbl"><tr><th>#</th><th>País</th><th>${METRIC_NAMES[m]}</th><th>Var%</th></tr>`;
      top5.forEach((x,i)=>{tbl+=`<tr><td>${i+1}</td><td>${CNAMES[x.co]}</td><td>${isM?x.v25.toFixed(1)+'%':fmtC(x.v25)+' MM'}</td><td style="${clrVar(x.chg)}">${fmtVar(x.chg)}</td></tr>`;});
      tbl+='</table>';
      addBot(`<strong>Países con mayor caída en ${METRIC_NAMES[m]} (2025 vs 2024):</strong>${tbl}`);
      return;
    }
  }

  // ── QUARTERLY for specific country ──
  const qIdx=detectQuarter(q);
  const co=detectCountry(q);
  if(qIdx!==null&&co){
    const qn=['Q1','Q2','Q3','Q4'][qIdx];
    const v25=qIncrMetric('2025',co,'ventas'),v24=qIncrMetric('2024',co,'ventas');
    const eb25=qIncrMetric('2025',co,'ebitda'),eb24=qIncrMetric('2024',co,'ebitda');
    const un25=qIncrMetric('2025',co,'un'),un24=qIncrMetric('2024',co,'un');
    const nm=CNAMES[co];
    const vv=v25[qIdx],vp=v24[qIdx],vc=varPct(vp,vv);
    const ev=eb25[qIdx],ep=eb24[qIdx],ec=varPct(ep,ev);
    const mg=vv?(ev/vv*100):0;
    let tbl=`<table class="ch-tbl"><tr><th>Métrica</th><th>${qn} 2025</th><th>${qn} 2024</th><th>Var%</th></tr>`;
    tbl+=`<tr><td><strong>Ventas</strong></td><td>${fmtC(vv)} MM</td><td>${fmtC(vp)} MM</td><td style="${clrVar(vc)}">${fmtVar(vc)}</td></tr>`;
    tbl+=`<tr><td><strong>EBITDA</strong></td><td>${fmtC(ev)} MM</td><td>${fmtC(ep)} MM</td><td style="${clrVar(ec)}">${fmtVar(ec)}</td></tr>`;
    tbl+=`<tr><td>Mg EBITDA</td><td>${mg.toFixed(1)}%</td><td>${vp?(ep/vp*100).toFixed(1)+'%':'n/d'}</td><td></td></tr>`;
    tbl+=`<tr><td><strong>Ut. Neta</strong></td><td>${fmtC(un25[qIdx])} MM</td><td>${fmtC(un24[qIdx])} MM</td><td style="${clrVar(varPct(un24[qIdx],un25[qIdx]))}">${fmtVar(varPct(un24[qIdx],un25[qIdx]))}</td></tr></table>`;
    addBot(`<strong>${nm} — ${qn} 2025 vs ${qn} 2024:</strong>${tbl}
      ${vv>vp?'Las ventas mostraron un <strong style="color:#10b981">crecimiento</strong> en el trimestre.':'Las ventas registraron una <strong style="color:#ef4444">disminución</strong> respecto al mismo trimestre del año anterior.'}`);
    return;
  }

  // ── SINGLE COUNTRY OVERVIEW ──
  if(co){
    const yr=detectYear(q)||'2025';
    const m=detectMetric(q);
    const d=getAnnual(co,yr);
    if(!d||d.ventas===0){addBot(`No tengo datos para <strong>${CNAMES[co]}</strong> en ${yr}. Es posible que no tenga operaciones activas.`);return;}
    const nm=CNAMES[co];

    if(m){
      // Specific metric
      const val=getMetricVal(d,m);
      const isM=isMgMetric(m);
      const prevYr=yr==='2025'?'2024':yr==='2024'?'2023':null;
      const dPrev=prevYr?getAnnual(co,prevYr):null;
      const valPrev=dPrev?getMetricVal(dPrev,m):null;
      const vc=valPrev?varPct(valPrev,val):null;
      let resp=`<strong>${nm} — ${METRIC_NAMES[m]} ${yr}:</strong><br><span style="font-size:18px;font-weight:800;color:#0f172a">${isM?val.toFixed(1)+'%':fmtC(val)+' MM MXN'}</span>`;
      if(vc!==null&&prevYr)resp+=`<br><span style="${clrVar(vc)};font-weight:700">${fmtVar(vc)} vs ${prevYr}</span> (era ${isM?valPrev.toFixed(1)+'%':fmtC(valPrev)+' MM'})`;
      addBot(resp);
      return;
    }

    // Full overview
    const prevYr2=yr==='2025'?'2024':yr==='2024'?'2023':null;
    const dPrev2=prevYr2?getAnnual(co,prevYr2):null;
    const vc=dPrev2?varPct(dPrev2.ventas,d.ventas):null;
    const ec=dPrev2?varPct(dPrev2.ebitda,d.ebitda):null;
    const mg=d.ventas?(d.ebitda/d.ventas*100):0;
    let tbl=`<table class="ch-tbl"><tr><th>Métrica</th><th>${yr}</th>${dPrev2?'<th>Var vs '+prevYr2+'</th>':''}</tr>`;
    [{k:'ventas',l:'Ventas'},{k:'costo',l:'Costo'},{k:'utilidad_bruta',l:'Ut. Bruta'},{k:'ebitda',l:'EBITDA'},{k:'ebit',l:'EBIT'},{k:'utilidad_neta',l:'Ut. Neta'}].forEach(r=>{
      const v=d[r.k],vP=dPrev2?dPrev2[r.k]:null,c=vP?varPct(vP,v):null;
      tbl+=`<tr><td>${r.l}</td><td>${fmtC(v)} MM</td>${dPrev2?`<td style="${clrVar(c)}">${fmtVar(c)}</td>`:''}</tr>`;
    });
    tbl+=`<tr><td><strong>Mg EBITDA</strong></td><td><strong>${mg.toFixed(1)}%</strong></td>${dPrev2?`<td>${dPrev2.ventas?(dPrev2.ebitda/dPrev2.ventas*100).toFixed(1)+'% (prev)':'n/d'}</td>`:''}</tr></table>`;
    addBot(`<strong>${nm} — Resumen ${yr}:</strong>${tbl}
      <div class="ch-suggest">
        <button onclick="askQ(this)">Ventas trimestrales de ${nm.split(' ')[0]}</button>
        <button onclick="askQ(this)">Margen EBITDA de ${nm.split(' ')[0]}</button>
      </div>`);
    return;
  }

  // ── ALL QUARTERS for a country (from suggestions) ──
  if(ql.match(/trimestral|trimestrales/)){
    const co2=detectCountry(q);
    if(co2){
      const nm=CNAMES[co2];
      const v25=qIncrMetric('2025',co2,'ventas'),v24=qIncrMetric('2024',co2,'ventas');
      const eb25=qIncrMetric('2025',co2,'ebitda');
      let tbl=`<table class="ch-tbl"><tr><th></th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>Total</th></tr>`;
      const tv25=v25.reduce((a,b)=>a+b,0);
      tbl+=`<tr><td>Ventas 25</td>${v25.map(v=>`<td>${fmtC(v)}</td>`).join('')}<td><strong>${fmtC(tv25)}</strong></td></tr>`;
      tbl+=`<tr><td>Ventas 24</td>${v24.map(v=>`<td>${fmtC(v)}</td>`).join('')}<td><strong>${fmtC(v24.reduce((a,b)=>a+b,0))}</strong></td></tr>`;
      tbl+=`<tr><td>Var%</td>${v25.map((v,i)=>{const c=varPct(v24[i],v);return`<td style="${clrVar(c)}">${fmtVar(c)}</td>`;}).join('')}<td style="${clrVar(varPct(v24.reduce((a,b)=>a+b,0),tv25))}">${fmtVar(varPct(v24.reduce((a,b)=>a+b,0),tv25))}</td></tr>`;
      tbl+=`<tr><td>EBITDA 25</td>${eb25.map(v=>`<td>${fmtC(v)}</td>`).join('')}<td><strong>${fmtC(eb25.reduce((a,b)=>a+b,0))}</strong></td></tr></table>`;
      addBot(`<strong>${nm} — Desglose Trimestral 2025 vs 2024:</strong>${tbl}`);
      return;
    }
  }

  // ── CONSOLIDADO total ──
  if(ql.match(/consolidado|total|general|todos|resumen general|global/)){
    const yr=detectYear(q)||'2025';
    let totV=0,totEb=0,totUn=0;
    ACTIVE.forEach(c=>{const d=getAnnual(c,yr);if(d){totV+=d.ventas;totEb+=d.ebitda;totUn+=d.utilidad_neta;}});
    let totV24=0,totEb24=0,totUn24=0;
    ACTIVE.forEach(c=>{const d=getAnnual(c,parseInt(yr)-1+'');if(d){totV24+=d.ventas;totEb24+=d.ebitda;totUn24+=d.utilidad_neta;}});
    const mg=totV?totEb/totV*100:0;
    addBot(`<strong>Consolidado Total ${yr}:</strong>
      <table class="ch-tbl">
      <tr><th>Métrica</th><th>${yr}</th><th>Var%</th></tr>
      <tr><td><strong>Ventas</strong></td><td>${fmtC(totV)} MM</td><td style="${clrVar(varPct(totV24,totV))}">${fmtVar(varPct(totV24,totV))}</td></tr>
      <tr><td><strong>EBITDA</strong></td><td>${fmtC(totEb)} MM</td><td style="${clrVar(varPct(totEb24,totEb))}">${fmtVar(varPct(totEb24,totEb))}</td></tr>
      <tr><td>Mg EBITDA</td><td>${mg.toFixed(1)}%</td><td></td></tr>
      <tr><td><strong>Ut. Neta</strong></td><td>${fmtC(totUn)} MM</td><td style="${clrVar(varPct(totUn24,totUn))}">${fmtVar(varPct(totUn24,totUn))}</td></tr>
      </table>
      <div class="ch-suggest">
        <button onclick="askQ(this)">Top 5 países por ventas</button>
        <button onclick="askQ(this)">¿Qué país creció más?</button>
      </div>`);
    return;
  }

  // ── CLAUDE AI FALLBACK (via proxy) ──
  const typing=document.createElement('div');typing.className='ch-msg bot';typing.id='typing-indicator';
  typing.innerHTML='<div style="display:flex;gap:4px;align-items:center;"><span style="font-size:11px;color:#64748b;">Pensando</span><span class="typing-dots"><span>.</span><span>.</span><span>.</span></span></div>';
  chatMsgs().appendChild(typing);chatMsgs().scrollTop=chatMsgs().scrollHeight;

  callClaudeAPI(q).then(response=>{
    const t=document.getElementById('typing-indicator');if(t)t.remove();
    if(response){
      addBot(response);
    }else{
      addBot(`No pude conectar con Genomma AI en este momento. Prueba preguntas estructuradas:
        <div class="ch-suggest">
          <button onclick="askQ(this)">Resumen consolidado 2025</button>
          <button onclick="askQ(this)">Top 5 países por EBITDA</button>
          <button onclick="askQ(this)">¿Qué país creció más?</button>
        </div>`);
    }
  });
}
</script>
</body>
</html>
